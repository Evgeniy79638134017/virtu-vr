<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIRTU VR — Система управления</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f7fa;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.bg-blur{position:fixed;top:-120px;right:-120px;width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,.15),transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
.bg-blur2{position:fixed;bottom:-100px;left:-100px;width:350px;height:350px;background:radial-gradient(circle,rgba(236,72,153,.12),transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;text-align:center;max-width:800px;padding:40px 20px}
.logo{font-size:52px;font-weight:800;letter-spacing:-2px;margin-bottom:6px;color:#1a1a2e}
.logo span{background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:#94a3b8;font-size:15px;font-weight:400;margin-bottom:56px;letter-spacing:.3px}
.cards{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:40px 32px;width:300px;text-decoration:none;color:#1a1a2e;transition:all .35s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0;opacity:0;transition:opacity .35s}
.card-crm::before{background:linear-gradient(90deg,#6366f1,#818cf8)}
.card-content::before{background:linear-gradient(90deg,#ec4899,#f472b6)}
.card:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.08);border-color:#c7d2fe}
.card:hover::before{opacity:1}
.card-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 20px}
.card-crm .card-icon{background:linear-gradient(135deg,#eef2ff,#e0e7ff)}
.card-content .card-icon{background:linear-gradient(135deg,#fdf2f8,#fce7f3)}
.card-title{font-size:20px;font-weight:700;margin-bottom:10px}
.card-crm .card-title{color:#4f46e5}
.card-content .card-title{color:#db2777}
.card-desc{color:#64748b;font-size:14px;line-height:1.65}
.card-arrow{margin-top:20px;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;opacity:0;transform:translateX(-8px);transition:all .35s}
.card-crm .card-arrow{color:#6366f1}
.card-content .card-arrow{color:#ec4899}
.card:hover .card-arrow{opacity:1;transform:translateX(0)}
.footer{margin-top:64px;color:#94a3b8;font-size:12px;font-weight:400;letter-spacing:.5px}
@media(max-width:680px){.cards{flex-direction:column;align-items:center}.card{width:100%;max-width:340px}.logo{font-size:40px}}
</style>
</head>
<body>
<div class="bg-blur"></div>
<div class="bg-blur2"></div>
<div class="container">
  <div class="logo">VIRTU <span>VR</span></div>
  <div class="sub">Система управления бизнесом</div>
  <div class="cards">
    <a href="crm.html" class="card card-crm">
      <div class="card-icon">📊</div>
      <div class="card-title">CRM</div>
      <div class="card-desc">Лиды, клиенты, сделки, отзывы. Канбан-доска и аналитика.</div>
      <div class="card-arrow">Открыть →</div>
    </a>
    <a href="content.html" class="card card-content">
      <div class="card-icon">🎬</div>
      <div class="card-title">Фабрика контента</div>
      <div class="card-desc">Контент-план, календарь, шаблоны, метрики по каналам.</div>
      <div class="card-arrow">Открыть →</div>
    </a>
  </div>
  <div class="footer">VIRTU VR × ИИщенко LAB · 2026</div>
</div>
</body>
</html>
